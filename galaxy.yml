namespace: jomrr
name: samba
version: 1.0.2
readme: README.md
authors:
  - Jonas Mauer
description: >-
  Manage Samba AD DC objects (users, groups, OUs) and Samba internal DNS
  records via native Python bindings.
license_file: LICENSE
tags:
  - samba
  - activedirectory
  - dns
  - ldap
  - identity
  - infrastructure
  - security
repository: https://github.com/jomrr/ansible-collection-samba
documentation: https://github.com/jomrr/ansible-collection-samba#readme
homepage: https://github.com/jomrr/ansible-collection-samba
issues: https://github.com/jomrr/ansible-collection-samba/issues
build_ignore:
  # development-only directories and files, not shipped in the release artifact
  - extensions/molecule
  - architecture
  - docs
  - .ansible-lint
  - .github
  - .ansible
  - .claude
  - .gitignore
  - CLAUDE.md
  - dist
  - "*.tar.gz"
  - pyproject.toml
  - Makefile
  - .mypy_cache
  - "*/.mypy_cache"
  - .pytest_cache
  - "*/.pytest_cache"
  - tests/output
  # transient changelog fragments (build-only input, consumed at release time);
  # the generated changelogs/changelog.yaml and CHANGELOG.rst still ship
  - changelogs/fragments
