# python-semantic-release configuration ONLY. This file exists solely to drive
# the release workflow (.github/workflows/release.yml); it is NOT part of the
# collection and is excluded from the Galaxy build artifact via build_ignore.
#
# How it works: python-semantic-release reads the Conventional Commits since the
# last tag (feat -> minor; fix/perf -> patch; feat!/BREAKING CHANGE -> major;
# this is the built-in "conventional" parser, the default), bumps the version in
# galaxy.yml, builds the collection tarball, commits, tags (vX.Y.Z) and creates
# the GitHub release with commit-derived notes.
#
# The repository changelog (CHANGELOG.rst) stays under antsibull-changelog's
# control: the release workflow runs `semantic-release version --no-changelog`,
# so PSR never writes its own changelog file (its default would be CHANGELOG.md,
# a different file anyway). The GitHub release notes still come from the commits.
#
# No token is configured here on purpose: PSR resolves it from the GH_TOKEN /
# GITHUB_TOKEN environment variable at runtime (the GitHub Actions GITHUB_TOKEN).
[tool.semantic_release]
version_variables = ["galaxy.yml:version"]
build_command = "ansible-galaxy collection build --output-path dist/"
commit_message = "chore(release): {version}\n\nAutomatically generated by python-semantic-release"
tag_format = "v{version}"

[tool.semantic_release.publish]
# Attach the built collection tarball to the GitHub release as an asset.
dist_glob_patterns = ["dist/*.tar.gz"]
upload_to_vcs_release = true
