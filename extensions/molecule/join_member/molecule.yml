---
# Multi-host integration scenario for samba_join_member, ISOLATED from every
# other scenario (separate container names, separate run, separate realms) so a
# bug here cannot take the other suites down.
#
# Topology: isolated DC+member PAIRS, one distinct realm per pair, the DC always
# Debian (the join_dc template). Four pairs = eight containers (4 DCs + 4
# members):
#
#   mdc-deb  (debian, realm DEB.MEMBER.EXAMPLE.COM)  <- mb-deb  (debian)
#   mdc-fed  (debian, realm FED.MEMBER.EXAMPLE.COM)  <- mb-fed  (fedora)
#   mdc-suse (debian, realm SUSE.MEMBER.EXAMPLE.COM) <- mb-suse (opensuse)
#   mdc-ubu  (debian, realm UBU.MEMBER.EXAMPLE.COM)  <- mb-ubu  (ubuntu)
#
# Why pairs (see decisions.md / the join_dc topology note): one distinct realm
# per pair keeps each pair fully isolated even on the shared podman network, and
# confines a per-distro failure to its own pair. The variation under test is the
# JOINING member's distro; the DC side stays Debian on purpose.
#
# The core proof this scenario exists for: a user seeded on the DC with an
# explicit RFC2307 uidNumber must resolve on the member, through
# `idmap config <WORKGROUP> : backend = ad`, with EXACTLY that uidNumber
# (getent passwd) - proving the full idmap-ad/winbind/RFC2307 chain, not just
# "joined". The idmap/winbind/nsswitch configuration that makes getent work is a
# scenario FIXTURE (prepare), never the module's job; it doubles as the prototype
# for the later member-server role.
#
# All eight containers share one podman network so each member can reach its DC
# (the driver auto-creates the network; aardvark-dns resolves the container
# names). Names are short and collision-free vs the other scenarios so the
# derived NetBIOS names stay within the 15-character limit.

driver:
  name: podman

platforms:
  # --- pair: debian ---
  - name: mdc-deb
    image: docker.io/debian:stable
    pre_build_image: true
    privileged: true
    network: jomrr-join-member
    groups: [dc]
    tmpfs:
      /var/lib/samba: "rw,size=1g,mode=0755"
  - name: mb-deb
    image: docker.io/debian:stable
    pre_build_image: true
    privileged: true
    network: jomrr-join-member
    groups: [member]
    tmpfs:
      /var/lib/samba: "rw,size=1g,mode=0755"
  # --- pair: fedora ---
  - name: mdc-fed
    image: docker.io/debian:stable
    pre_build_image: true
    privileged: true
    network: jomrr-join-member
    groups: [dc]
    tmpfs:
      /var/lib/samba: "rw,size=1g,mode=0755"
  - name: mb-fed
    image: docker.io/fedora:latest
    pre_build_image: true
    privileged: true
    network: jomrr-join-member
    groups: [member]
    tmpfs:
      /var/lib/samba: "rw,size=1g,mode=0755"
  # --- pair: opensuse ---
  - name: mdc-suse
    image: docker.io/debian:stable
    pre_build_image: true
    privileged: true
    network: jomrr-join-member
    groups: [dc]
    tmpfs:
      /var/lib/samba: "rw,size=1g,mode=0755"
  - name: mb-suse
    image: docker.io/opensuse/tumbleweed:latest
    pre_build_image: true
    privileged: true
    network: jomrr-join-member
    groups: [member]
    tmpfs:
      /var/lib/samba: "rw,size=1g,mode=0755"
  # --- pair: ubuntu ---
  - name: mdc-ubu
    image: docker.io/debian:stable
    pre_build_image: true
    privileged: true
    network: jomrr-join-member
    groups: [dc]
    tmpfs:
      /var/lib/samba: "rw,size=1g,mode=0755"
  - name: mb-ubu
    image: docker.io/ubuntu:latest
    pre_build_image: true
    privileged: true
    network: jomrr-join-member
    groups: [member]
    tmpfs:
      /var/lib/samba: "rw,size=1g,mode=0755"

provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        # The DC admin password each DC is provisioned with and each member binds
        # with; meets the AD complexity policy.
        samba_admin_password: "P@ssw0rd-Int3gration"
        # Each host's own fully-qualified name in its pair's realm.
        samba_fqdn: "{{ inventory_hostname }}.{{ samba_realm | lower }}"
        # The RFC2307-seeded objects and their FIXED unix ids the member must
        # resolve to EXACTLY through idmap_ad (the core proof).
        samba_rfc_user: rfcuser
        samba_rfc_uid: 10042
        samba_rfc_user_gid: 10000
        samba_rfc_group: rfcgroup
        samba_rfc_gid: 10001
    host_vars:
      # Each pair shares a realm; the member additionally points at its DC.
      mdc-deb: {samba_realm: DEB.MEMBER.EXAMPLE.COM, samba_domain: DEB}
      mb-deb: {samba_realm: DEB.MEMBER.EXAMPLE.COM, samba_domain: DEB, target_dc: mdc-deb}
      mdc-fed: {samba_realm: FED.MEMBER.EXAMPLE.COM, samba_domain: FED}
      mb-fed: {samba_realm: FED.MEMBER.EXAMPLE.COM, samba_domain: FED, target_dc: mdc-fed}
      mdc-suse: {samba_realm: SUSE.MEMBER.EXAMPLE.COM, samba_domain: SUSE}
      mb-suse: {samba_realm: SUSE.MEMBER.EXAMPLE.COM, samba_domain: SUSE, target_dc: mdc-suse}
      mdc-ubu: {samba_realm: UBU.MEMBER.EXAMPLE.COM, samba_domain: UBU}
      mb-ubu: {samba_realm: UBU.MEMBER.EXAMPLE.COM, samba_domain: UBU, target_dc: mdc-ubu}
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml

verifier:
  name: ansible
