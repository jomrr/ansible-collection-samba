---
# Prepare both roles of every DC+member pair. The DC side is provisioned with
# samba-tool (--use-rfc2307) and seeds a user and a group carrying EXPLICIT,
# FIXED RFC2307 unix ids; the member side is configured as an AD member - the
# idmap-ad/winbind/nsswitch FIXTURE that makes getent resolve those ids - but is
# deliberately NOT joined here: the join is the converge test subject.
#
# Module boundary: samba_join_member performs ONLY the join (net_s3 ->
# secrets.tdb). Everything in the member smb.conf below (security=ads, the idmap
# config, winbind nss info) and nsswitch are SCENARIO FIXTURE, exactly as the
# (later) member-server role would set them - the module never writes them. This
# smb.conf is therefore the working prototype for that role.
#
# The verified idmap_ad/RFC2307 smb.conf parameters (proven to resolve the seeded
# uidNumber on the member) are:
#   security = ads + realm + workgroup            (makes the host an AD member)
#   idmap config * : backend = tdb / range        (the default/BUILTIN domain)
#   idmap config <WG> : backend = ad              (the AD domain uses RFC2307)
#   idmap config <WG> : schema_mode = rfc2307     (uidNumber/gidNumber/... schema)
#   idmap config <WG> : range = 10000-99999       (MUST include every seeded id)
#   idmap config <WG> : unix_primary_group = yes  (user's own gidNumber = primary
#                                                  gid; avoids needing a gidNumber
#                                                  on Domain Users)
#   idmap config <WG> : unix_nss_info = yes + winbind nss info = rfc2307
#                                                 (shell/home from AD)
#   winbind use default domain = yes              (getent passwd <user>, no prefix)
# plus nsswitch passwd/group routed through winbind.
#
# Linear strategy runs each task to completion on all matching hosts before the
# next, so all DC tasks (provision + seed + daemon) finish before the member
# tasks; the member only configures reachability here, the real cross-host
# contact (the join) happens in converge.
- name: Prepare the DC+member pairs
  hosts: all
  gather_facts: false
  vars:
    _dc_packages:
      Debian: [samba, samba-ad-dc, samba-ad-provision, samba-dsdb-modules, samba-vfs-modules, smbclient, winbind, python3-samba, ldb-tools, procps]
      RedHat: [samba-dc, samba-common-tools, python3-samba, krb5-workstation, procps-ng]
      Suse: [samba-ad-dc, samba-tool, samba-dsdb-modules, samba-client, samba-python3, python313-cryptography, krb5-client, krb5-server, samba-winbind]
    # Member side: an AD member with winbind + the nss_winbind module + the net
    # binary + the python3-samba bindings the module's net_s3 join needs. NOT the
    # AD DC daemon.
    _member_packages:
      Debian: [samba-common-bin, winbind, libnss-winbind, libpam-winbind, python3-samba, smbclient, krb5-user, procps]
      RedHat: [samba-winbind, samba-winbind-clients, samba-client, samba-common-tools, python3-samba, krb5-workstation, procps-ng]
      Suse: [samba-winbind, samba-client, samba-python3, krb5-client, procps]
    target_dc_fqdn: "{{ target_dc | default('') }}.{{ samba_realm | lower }}"
  tasks:
    # --- common: bootstrap and per-role packages ---
    - name: Prepare | Bootstrap python3 (stock base images ship none)
      ansible.builtin.raw: >-
        /bin/sh -c 'if command -v apt-get >/dev/null 2>&1; then
        export DEBIAN_FRONTEND=noninteractive;
        apt-get update -qq && apt-get install -y -qq python3;
        elif command -v dnf >/dev/null 2>&1; then dnf install -y -q python3;
        elif command -v zypper >/dev/null 2>&1; then
        zypper --non-interactive --gpg-auto-import-keys install -y python3; fi'
      changed_when: false

    - name: Prepare | Gather facts now that python3 is present
      ansible.builtin.setup:

    - name: Prepare | Resolve this host's own IPv4 from the podman hosts entry
      # Ansible's network facts are unavailable here (stock images ship no
      # iproute2 at gather time), so resolve the podman /etc/hosts self-entry with
      # getent (glibc), as in the join_dc scenario.
      ansible.builtin.command:
        cmd: "getent ahostsv4 {{ inventory_hostname }}"
      register: _own_ip_lookup
      changed_when: false

    - name: Prepare | Record this host's primary IPv4 on the pair network
      ansible.builtin.set_fact:
        _own_ipv4: "{{ _own_ip_lookup.stdout_lines[0].split()[0] }}"

    - name: Prepare | Refresh apt cache (Debian family)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts['os_family'] == "Debian"

    - name: Prepare | Refresh zypper cache (Suse family)
      ansible.builtin.command:
        cmd: zypper --non-interactive --gpg-auto-import-keys refresh
      changed_when: false
      when: ansible_facts['os_family'] == "Suse"

    - name: Prepare | Install the DC packages
      ansible.builtin.package:
        name: "{{ _dc_packages[ansible_facts['os_family']] }}"
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive
      when: "'dc' in group_names"

    - name: Prepare | Install the member packages
      ansible.builtin.package:
        name: "{{ _member_packages[ansible_facts['os_family']] }}"
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive
      when: "'member' in group_names"

    - name: Prepare | Map this host's own FQDN to its real container IP
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ _own_ipv4 }} {{ samba_fqdn }} {{ inventory_hostname }}"
        regexp: " {{ samba_fqdn }} "
        state: present
        unsafe_writes: true

    - name: Prepare | Remove the stock smb.conf so provision/join start clean
      ansible.builtin.file:
        path: /etc/samba/smb.conf
        state: absent

    # --- DC role: provision, seed RFC2307 objects, run as a daemon ---
    - name: Prepare | DC | Constrain idmap xid range to fit the rootless namespace
      # Only the DC provisions and chowns sysvol; low xids keep the chown inside
      # the rootless subordinate-id map. Test-fixture edit only.
      ansible.builtin.replace:
        path: /usr/share/samba/setup/idmap_init.ldif
        regexp: "{{ item.regexp }}"
        replace: "{{ item.replace }}"
      loop:
        - {regexp: '^lowerBound: .*', replace: 'lowerBound: 10000'}
        - {regexp: '^upperBound: .*', replace: 'upperBound: 60000'}
      loop_control:
        label: "{{ item.replace }}"
      when: "'dc' in group_names"

    - name: Prepare | DC | Provision the Samba AD domain with RFC2307 (this realm)
      ansible.builtin.command:
        cmd: >-
          samba-tool domain provision
          --server-role=dc
          --use-rfc2307
          --dns-backend=SAMBA_INTERNAL
          --realm={{ samba_realm }}
          --domain={{ samba_domain }}
          --adminpass={{ samba_admin_password }}
          --host-ip={{ _own_ipv4 }}
        creates: /var/lib/samba/private/sam.ldb
      no_log: true
      when: "'dc' in group_names"

    - name: Prepare | DC | Install the generated krb5.conf before starting the daemon
      ansible.builtin.copy:
        src: /var/lib/samba/private/krb5.conf
        dest: /etc/krb5.conf
        remote_src: true
        mode: "0644"
      when: "'dc' in group_names"

    - name: Prepare | DC | Start the Samba AD DC daemon
      ansible.builtin.command:
        cmd: samba --daemon
      changed_when: true
      when: "'dc' in group_names"

    - name: Prepare | DC | Wait until the local directory is queryable
      ansible.builtin.command:
        cmd: samba-tool user list
      register: _dc_ready
      until: _dc_ready.rc == 0
      retries: 30
      delay: 2
      changed_when: false
      when: "'dc' in group_names"

    - name: Prepare | DC | Point the DC resolver at its own internal DNS
      ansible.builtin.copy:
        content: "nameserver 127.0.0.1\n"
        dest: /etc/resolv.conf
        mode: "0644"
        unsafe_writes: true
      when: "'dc' in group_names"

    - name: Prepare | DC | Seed a group with a FIXED RFC2307 gidNumber
      ansible.builtin.command:
        argv:
          - samba-tool
          - group
          - add
          - "{{ samba_rfc_group }}"
          - "--nis-domain={{ samba_domain | lower }}"
          - "--gid-number={{ samba_rfc_gid }}"
      changed_when: true
      when: "'dc' in group_names"

    - name: Prepare | DC | Seed a user with FIXED RFC2307 uidNumber/gidNumber
      # The member must resolve this exact uidNumber via idmap_ad - the core
      # proof. The password is incidental; no_log keeps it out of the log.
      ansible.builtin.command:
        argv:
          - samba-tool
          - user
          - add
          - "{{ samba_rfc_user }}"
          - "{{ samba_admin_password }}"
          - "--nis-domain={{ samba_domain | lower }}"
          - "--unix-home=/home/{{ samba_rfc_user }}"
          - "--uid-number={{ samba_rfc_uid }}"
          - "--login-shell=/bin/bash"
          - "--gid-number={{ samba_rfc_user_gid }}"
      changed_when: true
      no_log: true
      when: "'dc' in group_names"

    # --- member role: reach the DC and become an AD member (fixture), no join ---
    - name: Prepare | Member | Resolve the DC's IP over the shared podman network
      ansible.builtin.command:
        cmd: "getent ahostsv4 {{ target_dc }}"
      register: _dc_lookup
      changed_when: false
      when: "'member' in group_names"

    - name: Prepare | Member | Map the DC FQDN to its IP (bootstrap before DNS switch)
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ _dc_lookup.stdout_lines[0].split()[0] }} {{ target_dc_fqdn }} {{ target_dc }}"
        regexp: " {{ target_dc_fqdn }} "
        state: present
        unsafe_writes: true
      when: "'member' in group_names"

    - name: Prepare | Member | Pin Kerberos to the DC (no SRV dependency)
      ansible.builtin.copy:
        dest: /etc/krb5.conf
        mode: "0644"
        content: |
          [libdefaults]
              default_realm = {{ samba_realm }}
              dns_lookup_realm = false
              dns_lookup_kdc = false
          [realms]
              {{ samba_realm }} = {
                  kdc = {{ target_dc_fqdn }}
                  admin_server = {{ target_dc_fqdn }}
              }
          [domain_realm]
              .{{ samba_realm | lower }} = {{ samba_realm }}
              {{ samba_realm | lower }} = {{ samba_realm }}
      when: "'member' in group_names"

    - name: Prepare | Member | Point the resolver at the DC's authoritative DNS
      ansible.builtin.copy:
        content: "nameserver {{ _dc_lookup.stdout_lines[0].split()[0] }}\n"
        dest: /etc/resolv.conf
        mode: "0644"
        unsafe_writes: true
      when: "'member' in group_names"

    - name: Prepare | Member | Write the AD-member smb.conf (the idmap_ad role prototype)
      # FIXTURE, not the module's job. The verified idmap_ad/RFC2307 parameters
      # that make the seeded uidNumber resolve unchanged (see the play header).
      # The idmap range MUST span every seeded id; security=ads makes this host an
      # AD member (equivalent to "server role = member server").
      ansible.builtin.copy:
        dest: /etc/samba/smb.conf
        mode: "0644"
        content: |
          [global]
              security = ads
              realm = {{ samba_realm }}
              workgroup = {{ samba_domain }}
              kerberos method = secrets and keytab

              idmap config * : backend = tdb
              idmap config * : range = 3000-7999

              idmap config {{ samba_domain }} : backend = ad
              idmap config {{ samba_domain }} : schema_mode = rfc2307
              idmap config {{ samba_domain }} : range = 10000-99999
              idmap config {{ samba_domain }} : unix_primary_group = yes
              idmap config {{ samba_domain }} : unix_nss_info = yes

              winbind nss info = rfc2307
              winbind use default domain = yes
              winbind enum users = yes
              winbind enum groups = yes
              template shell = /bin/bash
              template homedir = /home/%U
      when: "'member' in group_names"

    - name: Prepare | Member | Check for an /etc nsswitch.conf
      ansible.builtin.stat:
        path: /etc/nsswitch.conf
      register: _nss
      when: "'member' in group_names"

    - name: Prepare | Member | Seed /etc/nsswitch.conf from the vendor copy
      # openSUSE ships only the vendor default under /usr/etc (the /usr/etc config
      # split) and creates /etc/nsswitch.conf on demand; the other distros already
      # have it. Seed the /etc override from the vendor file so the winbind edit
      # below has a base to amend.
      ansible.builtin.copy:
        src: /usr/etc/nsswitch.conf
        dest: /etc/nsswitch.conf
        remote_src: true
        mode: "0644"
      when:
        - "'member' in group_names"
        - not _nss.stat.exists

    - name: Prepare | Member | Route nsswitch passwd/group through winbind
      # Append winbind to the passwd and group databases if not already present
      # (Python regex negative lookahead keeps it idempotent).
      ansible.builtin.replace:
        path: /etc/nsswitch.conf
        regexp: '^({{ item }}:(?!.*\bwinbind\b).*)$'
        replace: '\1 winbind'
      loop:
        - passwd
        - group
      when: "'member' in group_names"
