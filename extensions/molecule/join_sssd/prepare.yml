---
# Prepare both roles of every DC+client pair. The DC side is provisioned with
# samba-tool (--use-rfc2307) and seeds a user and a group carrying EXPLICIT,
# FIXED RFC2307 unix ids (identical to the join_member scenario's DC side); the
# client side is configured as an SSSD AD client - the sssd.conf/nsswitch FIXTURE
# that makes `id` resolve those ids - but is deliberately NOT joined here: the
# adcli join is the converge test subject.
#
# Module boundary: samba_join_sssd performs ONLY the join (adcli -> keytab).
# Everything below on the client (sssd.conf, nsswitch, the SSSD daemon in verify)
# is SCENARIO FIXTURE, exactly as the (later) SSSD client role would set it - the
# module never writes it. This sssd.conf is the working prototype for that role,
# the counterpart to the idmap_ad smb.conf the join_member scenario documents.
#
# The verified SSSD/RFC2307 parameters (proven to resolve the seeded uidNumber on
# the client) are:
#   id_provider = ad + ad_domain + krb5_realm     (AD identity provider)
#   ad_server = <dc-fqdn>                          (explicit DC; deterministic)
#   ldap_id_mapping = false   <-- THE KEY: false = use the AD RFC2307
#                                  uidNumber/gidNumber as-is; true = SSSD maps its
#                                  own ids from the SID. Must be false for the
#                                  exact-AD-uid proof.
#   ldap_schema = ad                               (AD's RFC2307 attribute names)
#   use_fully_qualified_names = false              (id <user>, no realm suffix)
#   fallback_homedir / default_shell               (posix attrs not in AD)
#   + sssd.conf MUST be chmod 0600 or SSSD refuses to start (classic gotcha)
#   + krb5.conf rdns = false (avoids GSSAPI hostname canonicalization failures)
# plus nsswitch passwd/group routed through sss.
#
# Linear strategy runs each task to completion on all matching hosts before the
# next, so all DC tasks finish before the client tasks; the client only configures
# reachability here, the real cross-host contact (the join) happens in converge.
- name: Prepare the DC+client pairs
  hosts: all
  gather_facts: false
  vars:
    _dc_packages:
      Debian: [samba, samba-ad-dc, samba-ad-provision, samba-dsdb-modules, samba-vfs-modules, smbclient, winbind, python3-samba, ldb-tools, procps]
      RedHat: [samba-dc, samba-common-tools, python3-samba, krb5-workstation, procps-ng]
      Suse: [samba-ad-dc, samba-tool, samba-dsdb-modules, samba-client, samba-python3, python313-cryptography, krb5-client, krb5-server, samba-winbind]
    # Client side: SSSD with the AD provider, adcli for the join, the nss_sss
    # module and a Kerberos client. NOT samba.
    _client_packages:
      Debian: [sssd, sssd-ad, sssd-tools, adcli, krb5-user, libnss-sss, libpam-sss, procps]
      RedHat: [sssd, sssd-ad, sssd-tools, adcli, krb5-workstation, procps-ng]
      Suse: [sssd, sssd-ad, sssd-tools, adcli, krb5-client, procps]
    target_dc_fqdn: "{{ target_dc | default('') }}.{{ samba_realm | lower }}"
  tasks:
    # --- common: bootstrap and per-role packages ---
    - name: Prepare | Bootstrap python3 (stock base images ship none)
      ansible.builtin.raw: >-
        /bin/sh -c 'if command -v apt-get >/dev/null 2>&1; then
        export DEBIAN_FRONTEND=noninteractive;
        apt-get update -qq && apt-get install -y -qq python3;
        elif command -v dnf >/dev/null 2>&1; then dnf install -y -q python3;
        elif command -v zypper >/dev/null 2>&1; then
        zypper --non-interactive --gpg-auto-import-keys install -y python3; fi'
      changed_when: false

    - name: Prepare | Gather facts now that python3 is present
      ansible.builtin.setup:

    - name: Prepare | Resolve this host's own IPv4 from the podman hosts entry
      # Network facts are unavailable here (no iproute2 at gather time); resolve
      # the podman /etc/hosts self-entry with getent, as in the other scenarios.
      ansible.builtin.command:
        cmd: "getent ahostsv4 {{ inventory_hostname }}"
      register: _own_ip_lookup
      changed_when: false

    - name: Prepare | Record this host's primary IPv4 on the pair network
      ansible.builtin.set_fact:
        _own_ipv4: "{{ _own_ip_lookup.stdout_lines[0].split()[0] }}"

    - name: Prepare | Refresh apt cache (Debian family)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts['os_family'] == "Debian"

    - name: Prepare | Refresh zypper cache (Suse family)
      ansible.builtin.command:
        cmd: zypper --non-interactive --gpg-auto-import-keys refresh
      changed_when: false
      when: ansible_facts['os_family'] == "Suse"

    - name: Prepare | Install the DC packages
      ansible.builtin.package:
        name: "{{ _dc_packages[ansible_facts['os_family']] }}"
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive
      when: "'dc' in group_names"

    - name: Prepare | Install the client packages
      ansible.builtin.package:
        name: "{{ _client_packages[ansible_facts['os_family']] }}"
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive
      when: "'client' in group_names"

    - name: Prepare | Map this host's own FQDN to its real container IP
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ _own_ipv4 }} {{ samba_fqdn }} {{ inventory_hostname }}"
        regexp: " {{ samba_fqdn }} "
        state: present
        unsafe_writes: true

    - name: Prepare | Remove the stock smb.conf so provision starts clean
      ansible.builtin.file:
        path: /etc/samba/smb.conf
        state: absent

    # --- DC role: provision, seed RFC2307 objects, run as a daemon ---
    - name: Prepare | DC | Constrain idmap xid range to fit the rootless namespace
      # Only the DC provisions and chowns sysvol; low xids keep the chown inside
      # the rootless subordinate-id map. Test-fixture edit only.
      ansible.builtin.replace:
        path: /usr/share/samba/setup/idmap_init.ldif
        regexp: "{{ item.regexp }}"
        replace: "{{ item.replace }}"
      loop:
        - {regexp: '^lowerBound: .*', replace: 'lowerBound: 10000'}
        - {regexp: '^upperBound: .*', replace: 'upperBound: 60000'}
      loop_control:
        label: "{{ item.replace }}"
      when: "'dc' in group_names"

    - name: Prepare | DC | Provision the Samba AD domain with RFC2307 (this realm)
      ansible.builtin.command:
        cmd: >-
          samba-tool domain provision
          --server-role=dc
          --use-rfc2307
          --dns-backend=SAMBA_INTERNAL
          --realm={{ samba_realm }}
          --domain={{ samba_domain }}
          --adminpass={{ samba_admin_password }}
          --host-ip={{ _own_ipv4 }}
        creates: /var/lib/samba/private/sam.ldb
      no_log: true
      when: "'dc' in group_names"

    - name: Prepare | DC | Install the generated krb5.conf before starting the daemon
      ansible.builtin.copy:
        src: /var/lib/samba/private/krb5.conf
        dest: /etc/krb5.conf
        remote_src: true
        mode: "0644"
      when: "'dc' in group_names"

    - name: Prepare | DC | Start the Samba AD DC daemon
      ansible.builtin.command:
        cmd: samba --daemon
      changed_when: true
      when: "'dc' in group_names"

    - name: Prepare | DC | Wait until the local directory is queryable
      ansible.builtin.command:
        cmd: samba-tool user list
      register: _dc_ready
      until: _dc_ready.rc == 0
      retries: 30
      delay: 2
      changed_when: false
      when: "'dc' in group_names"

    - name: Prepare | DC | Point the DC resolver at its own internal DNS
      ansible.builtin.copy:
        content: "nameserver 127.0.0.1\n"
        dest: /etc/resolv.conf
        mode: "0644"
        unsafe_writes: true
      when: "'dc' in group_names"

    - name: Prepare | DC | Seed a group with a FIXED RFC2307 gidNumber
      ansible.builtin.command:
        argv:
          - samba-tool
          - group
          - add
          - "{{ samba_rfc_group }}"
          - "--nis-domain={{ samba_domain | lower }}"
          - "--gid-number={{ samba_rfc_gid }}"
      changed_when: true
      when: "'dc' in group_names"

    - name: Prepare | DC | Seed a user with FIXED RFC2307 uidNumber/gidNumber
      # The client must resolve this exact uidNumber via SSSD - the core proof.
      # The password is incidental; no_log keeps it out of the log.
      ansible.builtin.command:
        argv:
          - samba-tool
          - user
          - add
          - "{{ samba_rfc_user }}"
          - "{{ samba_admin_password }}"
          - "--nis-domain={{ samba_domain | lower }}"
          - "--unix-home=/home/{{ samba_rfc_user }}"
          - "--uid-number={{ samba_rfc_uid }}"
          - "--login-shell=/bin/bash"
          - "--gid-number={{ samba_rfc_user_gid }}"
      changed_when: true
      no_log: true
      when: "'dc' in group_names"

    # --- client role: reach the DC and configure SSSD (fixture), no join ---
    - name: Prepare | Client | Resolve the DC's IP over the shared podman network
      ansible.builtin.command:
        cmd: "getent ahostsv4 {{ target_dc }}"
      register: _dc_lookup
      changed_when: false
      when: "'client' in group_names"

    - name: Prepare | Client | Map the DC FQDN to its IP (bootstrap before DNS switch)
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ _dc_lookup.stdout_lines[0].split()[0] }} {{ target_dc_fqdn }} {{ target_dc }}"
        regexp: " {{ target_dc_fqdn }} "
        state: present
        unsafe_writes: true
      when: "'client' in group_names"

    - name: Prepare | Client | Pin Kerberos to the DC (no SRV/rDNS dependency)
      # rdns = false avoids the GSSAPI "Server not found in Kerberos database"
      # failure when reverse DNS canonicalizes the DC name unexpectedly.
      ansible.builtin.copy:
        dest: /etc/krb5.conf
        mode: "0644"
        content: |
          [libdefaults]
              default_realm = {{ samba_realm }}
              dns_lookup_realm = false
              dns_lookup_kdc = false
              rdns = false
          [realms]
              {{ samba_realm }} = {
                  kdc = {{ target_dc_fqdn }}
                  admin_server = {{ target_dc_fqdn }}
              }
          [domain_realm]
              .{{ samba_realm | lower }} = {{ samba_realm }}
              {{ samba_realm | lower }} = {{ samba_realm }}
      when: "'client' in group_names"

    - name: Prepare | Client | Point the resolver at the DC's authoritative DNS
      ansible.builtin.copy:
        content: "nameserver {{ _dc_lookup.stdout_lines[0].split()[0] }}\n"
        dest: /etc/resolv.conf
        mode: "0644"
        unsafe_writes: true
      when: "'client' in group_names"

    - name: Prepare | Client | Write the SSSD AD-client config (the role prototype)
      # FIXTURE, not the module's job. ldap_id_mapping = false is THE parameter
      # that makes SSSD use the AD RFC2307 uidNumber/gidNumber unchanged. Mode 0600
      # is mandatory: SSSD refuses to start on a world-readable config.
      ansible.builtin.copy:
        dest: /etc/sssd/sssd.conf
        mode: "0600"
        content: |
          [sssd]
          config_file_version = 2
          services = nss, pam
          domains = {{ samba_realm | lower }}

          [domain/{{ samba_realm | lower }}]
          id_provider = ad
          ad_domain = {{ samba_realm | lower }}
          krb5_realm = {{ samba_realm }}
          ad_server = {{ target_dc_fqdn }}
          ldap_id_mapping = false
          ldap_schema = ad
          use_fully_qualified_names = false
          fallback_homedir = /home/%u
          default_shell = /bin/bash
          cache_credentials = false
      when: "'client' in group_names"

    - name: Prepare | Client | Check for an /etc nsswitch.conf
      ansible.builtin.stat:
        path: /etc/nsswitch.conf
      register: _nss
      when: "'client' in group_names"

    - name: Prepare | Client | Seed /etc/nsswitch.conf from the vendor copy
      # openSUSE ships only the vendor default under /usr/etc and creates
      # /etc/nsswitch.conf on demand; the other distros already have it. (Learned
      # in the join_member scenario.)
      ansible.builtin.copy:
        src: /usr/etc/nsswitch.conf
        dest: /etc/nsswitch.conf
        remote_src: true
        mode: "0644"
      when:
        - "'client' in group_names"
        - not _nss.stat.exists

    - name: Prepare | Client | Route nsswitch passwd/group through sss
      # Append sss to the passwd and group databases if not already present
      # (Python regex negative lookahead keeps it idempotent).
      ansible.builtin.replace:
        path: /etc/nsswitch.conf
        regexp: '^({{ item }}:(?!.*\bsss\b).*)$'
        replace: '\1 sss'
      loop:
        - passwd
        - group
      when: "'client' in group_names"
