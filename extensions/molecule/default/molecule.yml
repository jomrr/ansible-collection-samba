---
# Integration scenario. Targets the PRE-BUILT images (referenced, never built
# or modified here). Rootless podman; the DC containers run privileged for the
# test environment (see architecture/decisions.md, Container Runtime).
#
# The DC runs Samba as a plain daemon (started in prepare.yml), NOT under
# systemd: that keeps each container's resource footprint small (no PID1 init /
# journald), so the full distro matrix runs even alongside other containers.
#
# /var/lib/samba is a per-run tmpfs: it lives in the container's own mount
# namespace, where the native security.NTACL xattr is writable, and gives each
# run a clean, disposable domain.

driver:
  name: podman

platforms:
  - name: samba-debian
    image: docker.io/debian:stable
    pre_build_image: true
    privileged: true
    tmpfs:
      /var/lib/samba: "rw,size=1g,mode=0755"
  - name: samba-fedora
    image: docker.io/fedora:latest
    pre_build_image: true
    privileged: true
    tmpfs:
      /var/lib/samba: "rw,size=1g,mode=0755"
  - name: samba-opensuse
    image: docker.io/opensuse/tumbleweed:latest
    pre_build_image: true
    privileged: true
    tmpfs:
      /var/lib/samba: "rw,size=1g,mode=0755"
  - name: samba-ubuntu
    image: docker.io/ubuntu:latest
    pre_build_image: true
    privileged: true
    tmpfs:
      /var/lib/samba: "rw,size=1g,mode=0755"

provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        samba_realm: SAMDOM.EXAMPLE.COM
        samba_domain: SAMDOM
        samba_admin_password: "P@ssw0rd-Int3gration"
        samba_base_dn: "DC={{ samba_realm | lower | replace('.', ',DC=') }}"
        samba_dns_zone: "{{ samba_realm | lower }}"
        samba_fqdn: "{{ inventory_hostname }}.{{ samba_realm | lower }}"
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml

verifier:
  name: ansible
