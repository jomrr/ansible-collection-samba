---
# Verify the converged state by reading it back through the *_info modules.
# (Idempotence itself is asserted by molecule's second converge run.)
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Verify | Read the created user
      jomrr.samba.samba_user_info:
        username: jane
      register: _jane

    - name: Verify | The user exists with the expected attributes, enabled
      ansible.builtin.assert:
        that:
          - _jane.users | length == 1
          - _jane.users[0].given_name == "Jane"
          - _jane.users[0].surname == "Doe"
          - _jane.users[0].display_name == "Jane Doe"
          - _jane.users[0].email == "jane.doe@example.com"
          - _jane.users[0].enabled is true

    - name: Verify | Read the modified user
      jomrr.samba.samba_user_info:
        username: tomodify
      register: _tomodify

    - name: Verify | The attribute change is present
      ansible.builtin.assert:
        that:
          - _tomodify.users[0].display_name == "New Name"

    - name: Verify | Read the multi-attribute user
      jomrr.samba.samba_user_info:
        username: multiattr
      register: _multiattr

    - name: Verify | All of the changed attributes are present
      ansible.builtin.assert:
        that:
          - _multiattr.users[0].given_name == "Multi"
          - _multiattr.users[0].surname == "User"
          - _multiattr.users[0].display_name == "New Multi"
          - _multiattr.users[0].email == "multi.user@example.com"
          - _multiattr.users[0].description == "New multi description"

    - name: Verify | Read the disabled user
      jomrr.samba.samba_user_info:
        username: todisable
      register: _todisable

    - name: Verify | The user is disabled
      ansible.builtin.assert:
        that:
          - _todisable.users[0].enabled is false

    - name: Verify | Read the re-enabled user
      jomrr.samba.samba_user_info:
        username: toenable
      register: _toenable

    - name: Verify | The user is enabled again
      ansible.builtin.assert:
        that:
          - _toenable.users[0].enabled is true

    - name: Verify | Read the deleted user
      jomrr.samba.samba_user_info:
        username: todelete
      register: _todelete

    - name: Verify | The deleted user is gone
      ansible.builtin.assert:
        that:
          - _todelete.users | length == 0

    - name: Verify | Read the created group
      jomrr.samba.samba_group_info:
        name: engineers
      register: _engineers

    - name: Verify | The group has the right type and member
      ansible.builtin.assert:
        that:
          - _engineers.groups | length == 1
          - _engineers.groups[0].scope == "global"
          - _engineers.groups[0].category == "security"
          - _engineers.groups[0].members | length == 1
          - "'jane' in (_engineers.groups[0].members | join(' ') | lower)"

    - name: Verify | Read the purged group
      jomrr.samba.samba_group_info:
        name: crew
      register: _crew

    - name: Verify | Authoritative purge removed the other two members
      ansible.builtin.assert:
        that:
          - _crew.groups[0].members | length == 1
          - "'tomodify' in (_crew.groups[0].members | join(' ') | lower)"
          - "'extrauser' not in (_crew.groups[0].members | join(' ') | lower)"
          - "'toenable' not in (_crew.groups[0].members | join(' ') | lower)"

    - name: Verify | Read the additive-membership group
      jomrr.samba.samba_group_info:
        name: addmembers
      register: _addmembers

    - name: Verify | The pre-existing and the added member are both present
      ansible.builtin.assert:
        that:
          - _addmembers.groups[0].members | length == 2
          - "'extrauser' in (_addmembers.groups[0].members | join(' ') | lower)"
          - "'jane' in (_addmembers.groups[0].members | join(' ') | lower)"

    - name: Verify | Read the scope-changed group
      jomrr.samba.samba_group_info:
        name: scopechange
      register: _scopechange

    - name: Verify | The group scope is now universal
      ansible.builtin.assert:
        that:
          - _scopechange.groups[0].scope == "universal"
          - _scopechange.groups[0].category == "security"

    - name: Verify | Read the group created with a member in an OU
      jomrr.samba.samba_group_info:
        name: gstaff
      register: _gstaff

    - name: Verify | The group sits in the OU and has its member
      ansible.builtin.assert:
        that:
          - _gstaff.groups[0].dn | lower is search('ou=loc_a')
          - "'jane' in (_gstaff.groups[0].members | join(' ') | lower)"

    - name: Verify | Read the top-level OU
      jomrr.samba.samba_ou_info:
        name: department
        path: "{{ samba_base_dn }}"
      register: _department

    - name: Verify | Read the second-level OU
      jomrr.samba.samba_ou_info:
        name: team
        path: "OU=department,{{ samba_base_dn }}"
      register: _team

    - name: Verify | Read the third-level OU
      jomrr.samba.samba_ou_info:
        name: squad
        path: "OU=team,OU=department,{{ samba_base_dn }}"
      register: _squad

    - name: Verify | Read the deleted OU
      jomrr.samba.samba_ou_info:
        name: todelete_ou
        path: "{{ samba_base_dn }}"
      register: _todelete_ou

    - name: Verify | Read the nested OU whose description changed
      jomrr.samba.samba_ou_info:
        name: submod
        path: "OU=loc_a,{{ samba_base_dn }}"
      register: _submod

    - name: Verify | The 3-level hierarchy exists, the deleted OU is gone, the nested description changed
      ansible.builtin.assert:
        that:
          - _department.ous | length == 1
          - _team.ous | length == 1
          - _team.ous[0].dn | lower is search('ou=team,ou=department')
          - _squad.ous | length == 1
          - _squad.ous[0].dn | lower is search('ou=squad,ou=team,ou=department')
          - _todelete_ou.ous | length == 0
          - _submod.ous[0].description == "New nested description"

    - name: Verify | List all OUs in the domain (no name)
      jomrr.samba.samba_ou_info:
      register: _all_ous

    - name: Verify | The created OUs appear in the full listing
      ansible.builtin.assert:
        that:
          - "'department' in (_all_ous.ous | map(attribute='name') | list)"
          - "'squad' in (_all_ous.ous | map(attribute='name') | list)"

    - name: Verify | Read the user placed in / moved between OUs
      jomrr.samba.samba_user_info:
        username: placed
      register: _placed

    - name: Verify | Read the moved user
      jomrr.samba.samba_user_info:
        username: mover
      register: _mover

    - name: Verify | The users sit under the expected OUs
      ansible.builtin.assert:
        that:
          - _placed.users[0].dn | lower is search('ou=loc_a')
          - _mover.users[0].dn | lower is search('ou=loc_b')

    - name: Verify | Read the group placed in / moved between OUs
      jomrr.samba.samba_group_info:
        name: gplaced
      register: _gplaced

    - name: Verify | Read the moved group
      jomrr.samba.samba_group_info:
        name: gmover
      register: _gmover

    - name: Verify | The groups sit under the expected OUs
      ansible.builtin.assert:
        that:
          - _gplaced.groups[0].dn | lower is search('ou=loc_a')
          - _gmover.groups[0].dn | lower is search('ou=loc_b')
