---
# Exercise all modules against the real DC. This playbook must be fully
# idempotent: molecule runs it twice and the second run must report no changes.
# Objects that are modified/disabled/deleted/purged/moved here were seeded in
# prepare.yml, so those transitions happen on the first run and are no-ops on
# the second.
#
# Deliberately NOT tested here: samba_user update_password=always. It is the one
# honestly non-idempotent path (the password cannot be read back, so the write
# is reported as a change every run). Molecule's idempotence stage re-runs this
# whole playbook and asserts zero changes with no per-task exclusion, so a task
# using update_password=always would (correctly) fail that stage. Its behaviour
# is covered by the unit tests instead; putting it here would mean weakening the
# idempotence invariant, which we do not do.
- name: Converge
  hosts: all
  gather_facts: false
  vars:
    _password: "{{ samba_admin_password }}"
  module_defaults:
    # All jomrr.samba modules connect with the admin credentials via GSSAPI
    # sign+seal LDAP; set once here instead of on every task.
    group/jomrr.samba.all:
      server: "{{ samba_fqdn }}"
      bind_username: Administrator
      bind_password: "{{ samba_admin_password }}"
      realm: "{{ samba_realm }}"
  tasks:
    - name: Converge | Create a user with the common attributes
      jomrr.samba.samba_user:
        username: jane
        given_name: Jane
        surname: Doe
        display_name: Jane Doe
        email: jane.doe@example.com
        description: Integration test user
        enabled: true
        password: "{{ _password }}"
        state: present

    - name: Converge | Change an attribute on an existing user
      jomrr.samba.samba_user:
        username: tomodify
        display_name: New Name
        state: present

    - name: Converge | Change several attributes on an existing user at once
      jomrr.samba.samba_user:
        username: multiattr
        given_name: Multi
        surname: User
        display_name: New Multi
        email: multi.user@example.com
        description: New multi description
        state: present

    - name: Converge | Disable an existing user
      jomrr.samba.samba_user:
        username: todisable
        enabled: false
        state: present

    - name: Converge | Re-enable a disabled user
      jomrr.samba.samba_user:
        username: toenable
        enabled: true
        state: present

    - name: Converge | Remove a user
      jomrr.samba.samba_user:
        username: todelete
        state: absent

    - name: Converge | Absent on a non-existent user is a no-op
      jomrr.samba.samba_user:
        username: ghost
        state: absent

    - name: Converge | Create a global security group with a member (additive)
      jomrr.samba.samba_group:
        name: engineers
        scope: global
        category: security
        description: Engineering team
        members:
          - jane
        state: present

    - name: Converge | Reduce a 3-member group to one authoritative member (purge)
      jomrr.samba.samba_group:
        name: crew
        members:
          - tomodify
        members_purge: true
        state: present

    - name: Converge | Add a member to a group that already has one (additive)
      jomrr.samba.samba_group:
        name: addmembers
        members:
          - jane
        state: present

    - name: Converge | Change a group's scope (global -> universal)
      jomrr.samba.samba_group:
        name: scopechange
        scope: universal
        category: security
        state: present

    - name: Converge | Create a top-level OU
      jomrr.samba.samba_ou:
        name: department
        path: "{{ samba_base_dn }}"
        description: Department OU
        state: present

    - name: Converge | Create a nested OU (its parent was just created)
      jomrr.samba.samba_ou:
        name: team
        path: "OU=department,{{ samba_base_dn }}"
        state: present

    - name: Converge | Create a third-level nested OU (parents just created)
      jomrr.samba.samba_ou:
        name: squad
        path: "OU=team,OU=department,{{ samba_base_dn }}"
        state: present

    - name: Converge | Change an existing OU's description
      jomrr.samba.samba_ou:
        name: oldou
        path: "{{ samba_base_dn }}"
        description: New OU description
        state: present

    - name: Converge | Change a nested OU's description
      jomrr.samba.samba_ou:
        name: submod
        path: "OU=loc_a,{{ samba_base_dn }}"
        description: New nested description
        state: present

    - name: Converge | Remove an (empty) OU
      jomrr.samba.samba_ou:
        name: todelete_ou
        path: "{{ samba_base_dn }}"
        state: absent

    - name: Converge | Absent on a non-existent OU is a no-op
      jomrr.samba.samba_ou:
        name: ghostou
        path: "{{ samba_base_dn }}"
        state: absent

    - name: Converge | Create a user directly in an OU
      jomrr.samba.samba_user:
        username: placed
        password: "{{ _password }}"
        path: "OU=loc_a,{{ samba_base_dn }}"
        state: present

    - name: Converge | Move a user to another OU (idempotent move)
      jomrr.samba.samba_user:
        username: mover
        path: "OU=loc_b,{{ samba_base_dn }}"
        state: present

    - name: Converge | Move a user to another OU AND change an attribute at once
      # Exercises the documented create -> move -> attributes order: the
      # displayName write must land on the post-move DN.
      jomrr.samba.samba_user:
        username: moverattr
        display_name: New MoverAttr
        path: "OU=loc_b,{{ samba_base_dn }}"
        state: present

    - name: Converge | Create a group directly in an OU
      jomrr.samba.samba_group:
        name: gplaced
        path: "OU=loc_a,{{ samba_base_dn }}"
        state: present

    - name: Converge | Move a group to another OU (idempotent move)
      jomrr.samba.samba_group:
        name: gmover
        path: "OU=loc_b,{{ samba_base_dn }}"
        state: present

    - name: Converge | Create a group with a member directly in an OU (path + members)
      jomrr.samba.samba_group:
        name: gstaff
        path: "OU=loc_a,{{ samba_base_dn }}"
        members:
          - jane
        state: present

    - name: Converge | Create an A record
      jomrr.samba.samba_dns_record:
        zone: "{{ samba_dns_zone }}"
        name: www
        type: A
        value: 192.0.2.10
        state: present

    - name: Converge | Create an AAAA record
      jomrr.samba.samba_dns_record:
        zone: "{{ samba_dns_zone }}"
        name: www
        type: AAAA
        value: 2001:db8::10
        state: present

    - name: Converge | Create a CNAME record
      jomrr.samba.samba_dns_record:
        zone: "{{ samba_dns_zone }}"
        name: ftp
        type: CNAME
        value: "www.{{ samba_dns_zone }}"
        state: present

    - name: Converge | Create an MX record at the apex
      jomrr.samba.samba_dns_record:
        zone: "{{ samba_dns_zone }}"
        name: "@"
        type: MX
        value: "mail.{{ samba_dns_zone }}"
        preference: 10
        state: present

    - name: Converge | Create a TXT record at the apex
      jomrr.samba.samba_dns_record:
        zone: "{{ samba_dns_zone }}"
        name: "@"
        type: TXT
        value: "v=spf1 -all"
        state: present

    - name: Converge | Create an SRV record
      jomrr.samba.samba_dns_record:
        zone: "{{ samba_dns_zone }}"
        name: _sip._tcp
        type: SRV
        value: "sip.{{ samba_dns_zone }}"
        priority: 0
        weight: 100
        port: 5060
        state: present

    - name: Converge | Create a PTR record
      jomrr.samba.samba_dns_record:
        zone: "{{ samba_dns_zone }}"
        name: ptrtest
        type: PTR
        value: "host.{{ samba_dns_zone }}"
        state: present

    - name: Converge | Create an NS delegation record
      jomrr.samba.samba_dns_record:
        zone: "{{ samba_dns_zone }}"
        name: deleg
        type: NS
        value: "ns1.{{ samba_dns_zone }}"
        state: present

    - name: Converge | Remove a seeded DNS record
      jomrr.samba.samba_dns_record:
        zone: "{{ samba_dns_zone }}"
        name: dnsdel
        type: A
        value: 192.0.2.99
        state: absent

    - name: Converge | Absent on a non-existent DNS record is a no-op
      jomrr.samba.samba_dns_record:
        zone: "{{ samba_dns_zone }}"
        name: ghostdns
        type: A
        value: 192.0.2.200
        state: absent

    - name: Converge | Create a forward DNS zone
      jomrr.samba.samba_dns_zone:
        name: ztest.example.com
        state: present

    - name: Converge | Create a reverse DNS zone
      jomrr.samba.samba_dns_zone:
        name: 2.0.192.in-addr.arpa
        state: present

    - name: Converge | Create a forest-replicated DNS zone
      jomrr.samba.samba_dns_zone:
        name: zforest.example.com
        replication: forest
        state: present

    - name: Converge | Remove a seeded DNS zone (and its records)
      jomrr.samba.samba_dns_zone:
        name: zdelete.example.com
        state: absent

    - name: Converge | Absent on a non-existent DNS zone is a no-op
      jomrr.samba.samba_dns_zone:
        name: zghost.example.com
        state: absent
