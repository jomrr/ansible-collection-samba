---
# Provision a Samba AD DC inside each container and run it as a plain daemon
# (no systemd). The base images are the stock distribution images, which ship
# no python3, so it is bootstrapped via raw before facts are gathered. Distro
# differences are handled via os_family facts. See
# architecture/decisions.md (DC Test Topology, Container Runtime).
- name: Prepare Samba AD DC
  hosts: all
  gather_facts: false
  vars:
    _samba_packages:
      Debian: [samba, samba-ad-dc, samba-ad-provision, samba-dsdb-modules, samba-vfs-modules, smbclient, winbind, python3-samba, ldb-tools, procps]
      RedHat: [samba-dc, samba-common-tools, python3-samba, krb5-workstation, procps-ng]
      # openSUSE's samba is built against the MIT KDC: without krb5-server
      # (/usr/sbin/krb5kdc) the daemon's mitkdc child fails to exec and takes the
      # whole `samba` process down, so no RPC/DNS service comes up. samba-winbind
      # provides the winbindd the AD DC daemon also launches.
      Suse: [samba-ad-dc, samba-tool, samba-dsdb-modules, samba-client, samba-python3, python313-cryptography, krb5-client, krb5-server, samba-winbind]
    samba_fqdn: "{{ inventory_hostname }}.{{ samba_realm | lower }}"
  tasks:
    - name: Prepare | Bootstrap python3 (stock base images ship none)
      # The podman connection shlex-splits and execs argv directly (no shell),
      # so shell logic must run via an explicit /bin/sh -c.
      ansible.builtin.raw: >-
        /bin/sh -c 'if command -v apt-get >/dev/null 2>&1; then
        export DEBIAN_FRONTEND=noninteractive;
        apt-get update -qq && apt-get install -y -qq python3;
        elif command -v dnf >/dev/null 2>&1; then dnf install -y -q python3;
        elif command -v zypper >/dev/null 2>&1; then
        zypper --non-interactive --gpg-auto-import-keys install -y python3; fi'
      changed_when: false

    - name: Prepare | Gather facts now that python3 is present
      ansible.builtin.setup:

    - name: Prepare | Refresh apt cache (Debian family)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts['os_family'] == "Debian"

    - name: Prepare | Refresh zypper cache (Suse family)
      ansible.builtin.command:
        cmd: zypper --non-interactive --gpg-auto-import-keys refresh
      changed_when: false
      when: ansible_facts['os_family'] == "Suse"

    - name: Prepare | Install Samba AD DC packages
      ansible.builtin.package:
        name: "{{ _samba_packages[ansible_facts['os_family']] }}"
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Prepare | Ensure the FQDN resolves to loopback
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "127.0.0.1 {{ samba_fqdn }} {{ inventory_hostname }}"
        regexp: " {{ samba_fqdn }} "
        state: present
        # /etc/hosts is a podman bind-mount; atomic rename is not possible.
        unsafe_writes: true

    - name: Prepare | Check whether the domain is already provisioned
      ansible.builtin.stat:
        path: /var/lib/samba/private/sam.ldb
      register: _samdb

    - name: Prepare | Remove stock smb.conf before provisioning
      ansible.builtin.file:
        path: /etc/samba/smb.conf
        state: absent
      when: not _samdb.stat.exists

    - name: Prepare | Constrain idmap xid range to fit the rootless user namespace
      # The default s4 idmap range (3,000,000-4,000,000) lies OUTSIDE the
      # rootless podman subordinate-id map (~65536 ids), so the sysvol chown
      # during the DC self-join hits an unmappable xid and Samba panics. Low
      # xids keep the chown inside the namespace. Test-fixture edit only.
      ansible.builtin.replace:
        path: /usr/share/samba/setup/idmap_init.ldif
        regexp: "{{ item.regexp }}"
        replace: "{{ item.replace }}"
      loop:
        - {regexp: '^lowerBound: .*', replace: 'lowerBound: 10000'}
        - {regexp: '^upperBound: .*', replace: 'upperBound: 60000'}
      loop_control:
        label: "{{ item.replace }}"
      when: not _samdb.stat.exists

    - name: Prepare | Provision the Samba AD domain
      ansible.builtin.command:
        cmd: >-
          samba-tool domain provision
          --server-role=dc
          --use-rfc2307
          --dns-backend=SAMBA_INTERNAL
          --realm={{ samba_realm }}
          --domain={{ samba_domain }}
          --adminpass={{ samba_admin_password }}
        creates: /var/lib/samba/private/sam.ldb
      no_log: true

    - name: Prepare | Install the generated krb5.conf
      ansible.builtin.copy:
        src: /var/lib/samba/private/krb5.conf
        dest: /etc/krb5.conf
        remote_src: true
        mode: "0644"

    - name: Prepare | Check whether the samba daemon is already running
      ansible.builtin.command:
        cmd: pgrep -x samba
      register: _samba_pg
      failed_when: false
      changed_when: false

    - name: Prepare | Start the Samba AD DC daemon
      ansible.builtin.command:
        cmd: samba --daemon
      changed_when: true
      when: _samba_pg.rc != 0

    - name: Prepare | Wait until the local directory is queryable
      # The modules use a local SamDB connection (system session), so a local
      # samba-tool query is the meaningful readiness gate; it also avoids a
      # samba-tool version quirk that rejects an explicit 127.0.0.1.
      ansible.builtin.command:
        cmd: samba-tool user list
      register: _dc_ready
      until: _dc_ready.rc == 0
      retries: 30
      delay: 2
      changed_when: false

    - name: Prepare | Wait until the DNS management RPC is serving
      # samba-tool dns talks to the dnsserver RPC over ncacn_ip_tcp. The modules
      # use the local SamDB and never need it, but the verify play queries through
      # it, so block until it answers. This also fails fast (with a clear cause)
      # if a daemon child did not start - e.g. the MIT KDC on openSUSE taking the
      # whole samba process down - which the local-LDB gate above cannot detect.
      ansible.builtin.command:
        argv:
          - samba-tool
          - dns
          - query
          - "{{ samba_fqdn }}"
          - "{{ samba_dns_zone }}"
          - "@"
          - A
          - "--username=Administrator"
      environment:
        PASSWD: "{{ samba_admin_password }}"
      register: _dns_rpc_ready
      until: _dns_rpc_ready.rc == 0
      retries: 30
      delay: 2
      changed_when: false

    # Seed objects that converge.yml will modify / disable / delete / purge, so
    # those transitions are real changes on the first converge and no-ops on the
    # second (the idempotence check). Seeding lives here, never in converge.
    - name: Prepare | Seed objects for the converge transition tests
      vars:
        _seed_password: "{{ samba_admin_password }}"
      block:
        - name: Prepare | seed | user whose attribute converge will change
          jomrr.samba.samba_user:
            username: tomodify
            display_name: Old Name
            password: "{{ _seed_password }}"
            state: present

        - name: Prepare | seed | user whose several attributes converge will change
          jomrr.samba.samba_user:
            username: multiattr
            display_name: Old Multi
            description: Old multi description
            password: "{{ _seed_password }}"
            state: present

        - name: Prepare | seed | user converge will disable
          jomrr.samba.samba_user:
            username: todisable
            enabled: true
            password: "{{ _seed_password }}"
            state: present

        - name: Prepare | seed | disabled user converge will re-enable
          jomrr.samba.samba_user:
            username: toenable
            enabled: false
            password: "{{ _seed_password }}"
            state: present

        - name: Prepare | seed | user converge will delete
          jomrr.samba.samba_user:
            username: todelete
            password: "{{ _seed_password }}"
            state: present

        - name: Prepare | seed | extra member converge will purge from a group
          jomrr.samba.samba_user:
            username: extrauser
            password: "{{ _seed_password }}"
            state: present

        - name: Prepare | seed | group converge will reduce from three members to one
          jomrr.samba.samba_group:
            name: crew
            scope: global
            category: security
            members: [extrauser, tomodify, toenable]
            state: present

        - name: Prepare | seed | group with a member converge will add to (additive)
          jomrr.samba.samba_group:
            name: addmembers
            scope: global
            category: security
            members: [extrauser]
            state: present

        - name: Prepare | seed | global group whose scope converge will change to universal
          jomrr.samba.samba_group:
            name: scopechange
            scope: global
            category: security
            state: present

        - name: Prepare | seed | OU whose description converge will change
          jomrr.samba.samba_ou:
            name: oldou
            path: "{{ samba_base_dn }}"
            description: Old OU description
            state: present

        - name: Prepare | seed | OU converge will delete
          jomrr.samba.samba_ou:
            name: todelete_ou
            path: "{{ samba_base_dn }}"
            state: present

        - name: Prepare | seed | OUs for the move tests
          jomrr.samba.samba_ou:
            name: "{{ item }}"
            path: "{{ samba_base_dn }}"
            state: present
          loop:
            - loc_a
            - loc_b

        - name: Prepare | seed | nested OU whose description converge will change
          jomrr.samba.samba_ou:
            name: submod
            path: "OU=loc_a,{{ samba_base_dn }}"
            description: Old nested description
            state: present

        - name: Prepare | seed | user converge will move to another OU
          jomrr.samba.samba_user:
            username: mover
            password: "{{ _seed_password }}"
            path: "OU=loc_a,{{ samba_base_dn }}"
            state: present

        - name: Prepare | seed | user converge will move AND change an attribute on
          jomrr.samba.samba_user:
            username: moverattr
            display_name: Old MoverAttr
            password: "{{ _seed_password }}"
            path: "OU=loc_a,{{ samba_base_dn }}"
            state: present

        - name: Prepare | seed | group converge will move to another OU
          jomrr.samba.samba_group:
            name: gmover
            path: "OU=loc_a,{{ samba_base_dn }}"
            state: present

        - name: Prepare | seed | DNS A record converge will remove
          jomrr.samba.samba_dns_record:
            zone: "{{ samba_dns_zone }}"
            name: dnsdel
            type: A
            value: 192.0.2.99
            state: present

        - name: Prepare | seed | DNS zone converge will remove
          jomrr.samba.samba_dns_zone:
            name: zdelete.example.com
            state: present
