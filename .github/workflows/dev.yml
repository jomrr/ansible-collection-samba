---
# Dev-branch workflow: the fast feedback loop. Runs on push to the dev branch
# and on pull requests targeting dev, calling the shared fast gates in test.yml.
# The full run (the same gates plus the Molecule matrix) lives in main.yml, which
# triggers on push to main and on release tags.
name: dev

"on":
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  test:
    uses: ./.github/workflows/test.yml
